<!-- AI Overview — HTML Shell (injected into SearXNG answer box) -->
<article id="ai-overview-box" class="ai-overview-box">
    <style>{css}</style>

    <div class="ai-header">
        <div class="ai-title">✨ AI Overview</div>
        <div class="ai-actions" id="ai-actions" style="visibility: hidden;">
            <button id="ai-copy-btn" title="Copy to clipboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy
            </button>
            <button id="ai-regen-btn" title="Regenerate answer">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                Retry
            </button>
        </div>
    </div>

    <!-- Container for previous turns -->
    <div id="ai-chat-history" class="ai-chat-history"></div>

    <!-- Current Turn Container -->
    <div id="ai-current-turn" class="ai-chat-turn">
        <!-- User Query Bubble -->
        <div id="ai-current-query" class="ai-user-query"></div>

        <!-- Shimmer skeleton (visible while waiting for first token) -->
        <div id="ai-skeleton" class="ai-skeleton">
            <div class="ai-skeleton-line"></div>
            <div class="ai-skeleton-line" style="width: 85%"></div>
            <div class="ai-skeleton-line" style="width: 40%"></div>
        </div>

        <!-- Answer content area -->
        <div class="ai-answer-wrapper ai-collapsed" id="ai-answer-wrapper">
            <div id="ai-answer" class="ai-answer"></div>
            <div id="ai-answer-fade" class="ai-answer-fade" style="display: none;">
                <button id="ai-show-more-btn" class="ai-show-more-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <span>Show More</span>
                </button>
            </div>
        </div>
        
        <!-- Source cards carousel -->
        <div id="ai-sources-container" class="ai-sources-container"></div>
    </div>

    <!-- Follow up input -->
    <form id="ai-followup-form" class="ai-followup-form" style="display: none;">
        <input type="text" id="ai-followup-input" placeholder="Ask a follow-up..." autocomplete="off">
        <button type="submit" id="ai-followup-submit" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </form>

    <script>{js}</script>
</article>
